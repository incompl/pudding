<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pudding</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <header id="topbar">
      <div id="tabs" role="tablist">
        <button class="tab active" type="button" role="tab" data-tab="files">Files</button>
        <button class="tab" type="button" role="tab" data-tab="streams">Streams</button>
      </div>
      <div id="topbar-splitter-spacer"></div>
      <div id="topbar-actions">
        <button id="settings-btn" type="button" aria-label="Settings" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
        <button id="settings-back-btn" class="hidden" type="button">Back</button>
      </div>
    </header>
    <main id="main-view">
      <section id="left">
        <div class="tab-panel" id="tab-files">
          <div id="folder-tree"></div>
        </div>
        <div class="tab-panel hidden" id="tab-streams">
          <div id="streams-list"></div>
        </div>
      </section>
      <div id="splitter" role="separator" aria-orientation="vertical"></div>
      <section id="right">
        <div id="now-playing-panel">
          <div id="now-playing-main">
            <p id="now-playing-title"></p>
            <p id="now-playing-artist" class="hidden"></p>
            <p id="now-playing-album" class="hidden"></p>
            <p id="now-playing-subtitle" class="hidden">Live Broadcast</p>
          </div>
          <div id="now-playing-controls">
            <button id="play-pause-btn" type="button" aria-label="Play" disabled>▶</button>
            <span id="time-current" class="time">0:00</span>
            <input type="range" id="seek-bar" min="0" max="0" value="0" step="0.1" disabled />
            <span id="time-remaining" class="time">-0:00</span>
          </div>
        </div>
        <div id="settings-panel" class="hidden">
          <h2>Settings</h2>
          <div class="setting">
            <label for="library-root">Library root</label>
            <input type="text" id="library-root" spellcheck="false" />
          </div>
          <div class="setting">
            <label for="manifest-path">Manifest path</label>
            <input type="text" id="manifest-path" spellcheck="false" />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
